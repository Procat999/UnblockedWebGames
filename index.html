<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProcatsZestyBestie | Unblocked Games</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

body{
margin:0;
background:#020202;
font-family:'Inter',sans-serif;
overflow-x:hidden;
color:white;
}

#initial-loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#020202;
z-index:9999;
flex-direction:column;
gap:1rem;
}

.spinner{
width:40px;
height:40px;
border:3px solid rgba(6,182,212,0.1);
border-top-color:#06b6d4;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.custom-scroll::-webkit-scrollbar{
width:4px;
}

.custom-scroll::-webkit-scrollbar-track{
background:transparent;
}

.custom-scroll::-webkit-scrollbar-thumb{
background:#06b6d4;
border-radius:10px;
}

@keyframes slideUp{
from{transform:translateY(15px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

.animate-pop{
animation:slideUp 0.2s ease-out forwards;
}
</style>
</head>
<body>

<div id="initial-loader">
<img src="https://www.pngplay.com/wp-content/uploads/13/Freepnglogos-Free-PNG.png" class="w-16 h-16 object-contain">
<div class="spinner"></div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel">

const {useState,useEffect,useRef}=React;

const Icon=({name,className=""})=>{
const iconRef=useRef(null);

useEffect(()=>{
if(iconRef.current && window.lucide){
lucide.createIcons({
icons:{[name]:lucide.icons[name]},
nameAttr:'data-lucide',
attrs:{class:className||'w-5 h-5'}
});
}
},[name,className]);

return <i ref={iconRef} data-lucide={name} className={`inline-flex ${className}`}></i>;
};

const MOCK_GAMES=[

{
id:"g1",
title:"Pixel Craft 1.8.8",
thumb:"https://wallpapersok.com/images/high/minecraft-landscape-logo-qwrbdubxu5n1n2k7.webp",
url:"https://pixelclient.xyz/",
tut:"Click WASM under 1.8.8 then wait for assets."
},

{
id:"g2",
title:"Youtube",
thumb:"https://static.vecteezy.com/system/resources/previews/065/386/840/non_2x/youtube-icon-logo-yt-app-editable-transparent-background-premium-social-media-design-for-digital-download-free-png.png",
url:"https://yt-clone-bay.vercel.app/",
tut:"Watch anything."
},

{
id:"g3",
title:"Five Nights At Freddys",
thumb:"https://logos-world.net/wp-content/uploads/2023/06/Five-Nights-at-Freddys-Symbol.png",
url:"https://irv77.github.io/hd_fnaf/",
tut:"Select the game you would like to play."
}

];

const ShareModal=({isOpen,onClose})=>{

const [copied,setCopied]=useState(false);
const shareUrl="https://procat999.github.io/UnblockedWebGames";

const copy=()=>{
navigator.clipboard.writeText(shareUrl);
setCopied(true);
setTimeout(()=>setCopied(false),2000);
};

if(!isOpen) return null;

return(
<div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80">

<div className="bg-[#111] w-full max-w-sm rounded-2xl border border-white/10 p-6">

<div className="flex justify-between mb-6">
<h3 className="text-xl font-black italic uppercase">Share Game</h3>
<button onClick={onClose}><Icon name="X"/></button>
</div>

<div className="flex gap-2 bg-black border border-white/5 p-3 rounded-xl">
<input readOnly value={shareUrl} className="bg-transparent text-xs w-full outline-none text-zinc-500"/>
<button onClick={copy} className="px-4 py-2 rounded-lg text-xs font-black uppercase bg-cyan-500 text-black">
{copied?"Copied":"Copy"}
</button>
</div>

</div>
</div>
);
};

const PlayerView=({game})=>{

const [share,setShare]=useState(false);

const openTab=(e)=>{
e.stopPropagation();
window.open(game.url,"_blank");
};

return(

<div className="flex flex-col gap-6">

<div className="aspect-video lg:aspect-[21/9] bg-black relative group transition-all shadow-2xl overflow-hidden rounded-[2.5rem] border border-white/10">

<iframe
src={game.url}
className="w-full h-full border-none"
allow="autoplay; gamepad; fullscreen"
/>

<div className="absolute top-6 right-6 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">

<button
onClick={openTab}
className="bg-white/10 hover:bg-white/20 backdrop-blur-md p-4 rounded-full border border-white/10 text-white"
>
<Icon name="Maximize"/>
</button>

</div>

</div>

<div className="flex justify-between items-center">

<h1 className="text-4xl font-black italic uppercase">{game.title}</h1>

<button
onClick={()=>setShare(true)}
className="flex items-center gap-2 bg-white/5 hover:bg-white/10 px-6 py-3 rounded-xl font-bold uppercase text-xs border border-white/10"
>
<Icon name="Share2" className="w-4 h-4 text-cyan-500"/>
Share
</button>

</div>

<ShareModal isOpen={share} onClose={()=>setShare(false)}/>

</div>

);
};

const App=()=>{

const [view,setView]=useState({type:"GRID",data:null});

useEffect(()=>{
const loader=document.getElementById("initial-loader");
if(loader) loader.style.display="none";
},[]);

return(

<div className="min-h-screen pt-24 pb-24 bg-[#020202] px-4 md:px-8">

<nav className="fixed top-0 inset-x-0 h-16 bg-[#050505]/90 backdrop-blur-xl border-b border-white/5 flex items-center justify-between px-8">

<div className="flex items-center gap-3 cursor-pointer" onClick={()=>setView({type:"GRID"})}>

<img src="https://www.pngplay.com/wp-content/uploads/13/Freepnglogos-Free-PNG.png" className="w-8"/>

<span className="font-black italic text-xl uppercase tracking-tighter">
ProcatsZestyBestie
</span>

</div>

</nav>

<div className="max-w-[1800px] mx-auto grid grid-cols-1 xl:grid-cols-4 gap-12">

<div className="xl:col-span-3">

{view.type==="GRID"?(
<div className="grid grid-cols-1 md:grid-cols-2 gap-8">

{MOCK_GAMES.map(g=>(

<div key={g.id} className="group cursor-pointer" onClick={()=>setView({type:"PLAYER",data:g})}>

<div className="aspect-video rounded-[2rem] overflow-hidden border border-white/5 group-hover:border-cyan-500/50 transition-all bg-[#0a0a0a]">

<img
src={g.thumb}
className="w-full h-full object-cover grayscale opacity-40 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700"
/>

</div>

<h3 className="mt-4 font-black italic uppercase text-xl group-hover:text-cyan-400">
{g.title}
</h3>

</div>

))}

</div>

):(

<div>

<button
onClick={()=>setView({type:"GRID"})}
className="mb-6 flex items-center gap-2 text-zinc-500 hover:text-white uppercase font-black text-xs italic"
>

<Icon name="ArrowLeft" className="w-4 h-4"/>
Back to Library

</button>

<PlayerView game={view.data}/>

</div>

)}

</div>

<div className="xl:col-span-1 border-t xl:border-t-0 xl:border-l border-white/5 pt-10 xl:pt-0 xl:pl-10">

<div className="sticky top-28">

<h2 className="text-[10px] font-black text-cyan-500 uppercase tracking-[0.4em] mb-6">
Instructions
</h2>

<div className="p-6 rounded-3xl bg-white/5 border border-white/10 text-zinc-400 text-sm">

Click a game and press the fullscreen icon to open it in a new tab.

</div>

</div>

</div>

</div>

</div>

);

};

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>

</body>
</html>
